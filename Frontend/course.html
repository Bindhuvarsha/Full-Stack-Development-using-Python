<!DOCTYPE html>
<html>
<head>
    <title>Online Courses</title>
    <link rel="stylesheet" href="sheet.css">
</head>

<body>

<h1>Hello, Students</h1>
<p>learning website</p>

<h2>Card</h2>

<p>A <strong>card</strong> uses all the 4 box model</p>
<p><strong>Width</strong></p>
<p><strong>Padding</strong></p>
<p><strong>Border</strong></p>
<p><strong>Margin</strong></p>

<div class="card">
    I am a card
</div>

<div class="card">
    I am another card
</div>


<h2>FlexBox</h2>

<div class="flex">
    <div class="box">Python</div>
    <div class="box">Java</div>
    <div class="box">Css</div>
</div>


<h2>Grid</h2>

<div class="grid">
    <div class="box">Full Stack with Python</div>
    <div class="box">Full Stack with Java</div>
    <div class="box">Excel automation</div>
</div>


<h2>Responsive Design</h2>

<div class="screen-label" id="label">
</div>


<script>
function checkscreen(){
    let label=document.getElementById("label");

    if(window.innerWidth <= 600){
        label.innerText="You are on small screen";
    }
    else{
        label.innerText="You are on big screen";
    }
}

window.addEventListener("resize",checkscreen);
checkscreen();

</script>

</body>
</html>
